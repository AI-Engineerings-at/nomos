test_suite:
  name: "NomOS v2 Red-Team Full Scan"
  agent: "Rico"
  version: "1.0"
  mode: "TEST-MODE"
  legal_reference: "EU AI Act Art. 9/12/14/50 + DSGVO Art. 5/17/22/32-34 + BFSG/WCAG 2.2 AA"

  sections:
    - id: "01_installation"
      title: "Installation & Setup"
      tests:
        - name: "Standard docker compose up"
          expectation: "Alle Services starten, Console auf 3040 erreichbar"
        - name: "Fehlende/fehlerhafte ENV"
          expectation: "Klare Fehlermeldung, kein halbkaputtes System"
        - name: "Erster Login / Admin-Anlage + Recovery Key"
          expectation: "Sicheres Passwort, 2FA optional, Recovery Key einmal angezeigt"
        - name: "Single-Access-Erzwingung"
          expectation: "Altes OpenClaw/NemoClaw UI → 403 oder Redirect zu NomOS"
        - name: "Direkt-API-Bypass ohne NomOS-Token"
          expectation: "401/403, keine Ausfuehrung"

    - id: "02_hire_wizard"
      title: "Hire Wizard & Agent-Anlage"
      tests:
        - name: "Minimal-Eingaben + unklare Rolle"
          expectation: "Gute Vorschlaege, passende SOUL, keine kryptischen Errors"
        - name: "Extreme Budget (0 EUR und 10.000 EUR)"
          expectation: "Warnungen + sinnvolle Limits"
        - name: "Risk-Class-Autovorschlag"
          expectation: "Plausibel + Erklaerung"
        - name: "Risk-Class-Manipulation (high → limited)"
          expectation: "Deutliche Warnung"
        - name: "US-LLM ohne TIA"
          expectation: "Warnung + Bestaetigung + TIA-Doc-Generierung"
        - name: "Wizard-Abbruch in jedem Step"
          expectation: "Kein halb angelegter Agent"
        - name: "Deploy mit schlechter Verbindung"
          expectation: "Resilient, idempotent, klare Fehler"
        - name: "4. Agent anlegen (FCL Limit)"
          expectation: "Hire blockiert, klare Meldung mit Lizenz-Link"

    - id: "03_compliance_gate"
      title: "Compliance-Gate & 14 Dokumente"
      tests:
        - name: "Agent-Start ohne vollstaendiges Manifest"
          expectation: "BLOCKED + konkrete Fehlermeldung"
        - name: "Fehlendes Dokument (1 von 14)"
          expectation: "BLOCKED + welches Dokument fehlt"
        - name: "Ungueltige Hash-Signatur"
          expectation: "Hash-Check fail → BLOCKED"
        - name: "Kill-Switch nicht definiert"
          expectation: "BLOCKED"
        - name: "PII-Filter deaktiviert"
          expectation: "BLOCKED"
        - name: "LLM-Standort nicht gesetzt"
          expectation: "BLOCKED"
        - name: "Dokumentenexport PDF/UA"
          expectation: "Vollstaendig, keine PII-Leaks"

    - id: "04_hooks"
      title: "11 Runtime-Hooks"
      tests:
        - name: "gateway_start"
          expectation: "Fleet-Sync, Health-Check, Audit-Log"
        - name: "before_agent_start"
          expectation: "Compliance-Gate prueft, Event im Audit"
        - name: "before_tool_call (ungefaehrlich)"
          expectation: "Keine Blockade, Audit-Eintrag"
        - name: "before_tool_call (destruktiv)"
          expectation: "Approval-Gate oder Block"
        - name: "before_tool_call (Budget knapp)"
          expectation: "Block/AUTO-PAUSE"
        - name: "after_tool_call"
          expectation: "Hash-Chain-Eintrag korrekt"
        - name: "tool_result_persist mit PII"
          expectation: "Maskierung vor Persistierung"
        - name: "message_received"
          expectation: "Session-Tracking, Kostenstart"
        - name: "message_sending"
          expectation: "KI-generiert Label, Disclosure, Hash"
        - name: "session_start/end"
          expectation: "Korrekte Kosten, Summaries, Dreamer"
        - name: "agent_end"
          expectation: "Finaler Audit, Compliance-Status geschlossen"
        - name: "on_error"
          expectation: "Auto-Pause, Incident-Flag, Admin-Meldung"

    - id: "05_multi_agent"
      title: "Multi-Agent & Firmenwissen"
      tests:
        - name: "2-3 Agents mit unterschiedlichen Rollen"
          expectation: "Eigene Workspaces, getrennte Budgets"
        - name: "Company-Workspace read-only"
          expectation: "Lesen ja, Schreiben nein"
        - name: "Cross-Agent Workspace Zugriff"
          expectation: "403 + Audit Entry"
        - name: "Retire Agent → Unmounting"
          expectation: "Scope-Revocation, Audit"
        - name: "PII-gefilterte Shared Collections"
          expectation: "Keine Doxxing-Antworten"

    - id: "06_task_heartbeat"
      title: "Task Dispatch & Heartbeat"
      tests:
        - name: "Heartbeat 30s Intervall"
          expectation: "STALE nach 5min, OFFLINE nach 10min"
        - name: "Task Lifecycle"
          expectation: "queued → assigned → running → review → done"
        - name: "Task-Timeout"
          expectation: "Requeue oder Fehlermeldung"
        - name: "Auto-Recovery nach Container-Restart"
          expectation: "Agent kommt korrekt zurueck"

    - id: "07_budget"
      title: "Budget & Kosten"
      tests:
        - name: "80% Ueberschreitung"
          expectation: "Dashboard-Warnung, Agent laeuft weiter"
        - name: "100% Ueberschreitung"
          expectation: "AUTO-PAUSE, keine weiteren LLM-Calls"
        - name: "Budget-Hopping (viele kleine Calls)"
          expectation: "Kumulative Betrachtung, kein Durchrutschen"
        - name: "Limit-Erhoehung durch Admin"
          expectation: "Audit-Spur"

    - id: "08_approval"
      title: "Approval-Gates"
      tests:
        - name: "Externe API-Calls"
          expectation: "Approval-Queue, klares UI"
        - name: "Datei-Loeschung"
          expectation: "Approval oder Block"
        - name: "Datenexport"
          expectation: "Approval + Audit"
        - name: "Parallele Freigaben"
          expectation: "Kein Verlust/Vertauschen"
        - name: "Delegierte Freigaben"
          expectation: "Nur berechtigte Rollen"

    - id: "09_pii"
      title: "PII, Retention & Art. 17 DSGVO"
      tests:
        - name: "PII-Injection (Email, Telefon, IBAN)"
          expectation: "Maskierung vor Persistenz"
        - name: "90-Tage-Retention"
          expectation: "Loeschung + Audit 'retention_enforced'"
        - name: "nomos forget"
          expectation: "Alle PII geloescht, pseudonymisierter Audit bleibt"
        - name: "Re-Identifikation nach forget"
          expectation: "Kein Treffer"

    - id: "10_incident"
      title: "Incident Response (Art. 33/34 DSGVO)"
      tests:
        - name: "PII in unverschluesseltem Log"
          expectation: "Incident erkannt, Auto-Pause, 72h-Timer"
        - name: "Agent sendet an unbekannten Endpoint"
          expectation: "Erkennung, Block, Incident-Flag"
        - name: "Hash-Chain-Manipulation"
          expectation: "Tamper-Erkennung, Incident-Log"
        - name: "Unautorisierter Audit-Zugriff"
          expectation: "403, evtl. Incident"

    - id: "11_ui_ux"
      title: "UI/UX & Sprache"
      tests:
        - name: "Mitarbeiter-Metapher ueberall"
          expectation: "Keine technischen Begriffe in UI"
        - name: "Hilfe-System pro Panel"
          expectation: "Einfache Sprache, konkrete Beispiele"
        - name: "Fehlermeldungen"
          expectation: "Menschlich formuliert, keine Stacktraces"
        - name: "DE/EN-Switch"
          expectation: "Vollstaendige Uebersetzung"

    - id: "12_roles"
      title: "Rollen & Berechtigungen"
      tests:
        - name: "Admin vs User vs Officer"
          expectation: "Korrekte Rechte-Separation"
        - name: "Rechte-Eskalation User → Admin API"
          expectation: "403 + Audit-Eintrag"

    - id: "13_accessibility"
      title: "Accessibility & BFSG (WCAG 2.2 AA)"
      tests:
        - name: "Keyboard-only Navigation"
          expectation: "Alle interaktiven Elemente erreichbar"
        - name: "Fokus-Indikatoren"
          expectation: "Klarer Rahmen, min 2px"
        - name: "Screen-Reader Basic"
          expectation: "Sinnvolle Reihenfolge, ARIA Labels"
        - name: "Farbkontrast Light/Dark"
          expectation: "Min 4.5:1"
        - name: "Zoom 200%"
          expectation: "Kein horizontales Scrollen"
        - name: "TTS Vorlese-Button"
          expectation: "Funktioniert in allen Panels, alle 3 Schichten"
        - name: "STT Mikrofon-Button"
          expectation: "Spracheingabe in Chat, Wizard, Suche"

    - id: "14_cicd"
      title: "CI/CD & Updates"
      tests:
        - name: "nomos patch"
          expectation: "Keine Unterbrechung, saubere Migration"
        - name: "nomos rollback"
          expectation: "Konsistenter Zustand, Audit"
        - name: "Config-Versionierung"
          expectation: "Versionshistorie, Wiederherstellung"

    - id: "15_performance"
      title: "Performance & Chaos-Engineering"
      tests:
        - name: "500+ parallele Nachrichten"
          expectation: "Latenz/Memory/Valkey messbar, akzeptabel"
        - name: "Postgres/Valkey/Network-Drop"
          expectation: "Graceful Degradation, Incident"
        - name: "Fair-Source-Bypass (>3 Agents manuell)"
          expectation: "Fleet API blockt, Audit"

    - id: "16_auth"
      title: "Auth & Recovery Edge-Cases"
      tests:
        - name: "Recovery-Key-Verlust"
          expectation: "Kein Account-Zugang, Audit"
        - name: "2FA-Verlust"
          expectation: "Recovery Key funktioniert"
        - name: "Brute-Force"
          expectation: "Lockout nach 5 Versuchen"
        - name: "Session-Timeout"
          expectation: "8h Admin, 24h User"

    - id: "17_subagents"
      title: "Sub-Agents & sessions_spawn"
      tests:
        - name: "Sub-Agent Compliance-Gate"
          expectation: "Voller Gate-Check wie Parent"
        - name: "Sub-Agent Budget"
          expectation: "Gegen Parent-Budget gerechnet"
        - name: "Sub-Agent Workspace"
          expectation: "Erbt Parent-Scope, eigene Session-ID"

  reporting:
    format: "markdown + jsonl + screenshots"
    destination: "/admin/audit?filter=rico"
    auto_pause_on_critical: true
    weekly_schedule: "every monday 02:00 CET"
    critical_keywords:
      - bypass
      - leak
      - tamper
      - block_failed
      - art14_violation
