name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nomos-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv tool install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: nomos-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest -v --tb=short
