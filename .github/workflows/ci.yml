name: CI â€” NomOS Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Stage 1: Lint (fast, catches obvious issues)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv tool install ruff
      - run: ruff check nomos-cli nomos-api
      - run: ruff format --check nomos-cli nomos-api

  lint-typescript:
    name: Lint TypeScript (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Plugin typecheck
        working-directory: nomos-plugin
        run: npm ci && npx tsc --noEmit
      - name: Console typecheck
        working-directory: nomos-console
        run: npm ci && npx tsc --noEmit

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Stage 2: Unit Tests (per package)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  test-cli:
    name: Test CLI (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: nomos-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest -v --tb=short --junitxml=../test-results/cli.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-cli
          path: test-results/
          retention-days: 7

  test-api:
    name: Test API (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: nomos-api
    # Real services (rule 02: no mocks for infra). The suite needs a live
    # Valkey (rate limiter) and Postgres (metrics middleware / DB paths).
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nomos
          POSTGRES_PASSWORD: nomos
          POSTGRES_DB: nomos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nomos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NOMOS_VALKEY_URL: valkey://localhost:6379
      NOMOS_DATABASE_URL: postgresql+asyncpg://nomos:nomos@localhost:5432/nomos
      # Hash chain HMAC anchoring fails closed without a key (>=32 bytes).
      # CI must inject a clearly-non-production key so any code path that
      # touches hash_chain can run; production injects via Vault.
      NOMOS_HASHCHAIN_HMAC_KEY: ci-only-hmac-test-key-not-for-production-32+
      # Both auth secrets are hard-gated by K3 (>=32 chars, not a sentinel).
      NOMOS_JWT_SECRET: ci-only-jwt-test-secret-not-for-prod-32+chars
      NOMOS_PLUGIN_API_KEY: ci-only-plugin-test-api-key-not-for-prod-32+
      NOMOS_DB_PASSWORD: nomos
      NOMOS_DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      # Apply Alembic migrations against the postgres service container BEFORE
      # pytest. Tests build via Base.metadata.create_all (SQLite in-memory),
      # which cannot catch model<->migration drift (the agent_memory
      # importance_score drift class). Running migrations on real Postgres in
      # CI fails-fast on any future drift before any test runs.
      - name: Apply Alembic migrations on real Postgres
        run: uv run alembic upgrade head
      - run: PYTHONPATH="../nomos-cli" uv run pytest -v --tb=short --junitxml=../test-results/api.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-api
          path: test-results/
          retention-days: 7

  test-plugin:
    name: Test Plugin (vitest)
    runs-on: ubuntu-latest
    needs: lint-typescript
    defaults:
      run:
        working-directory: nomos-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx vitest run --reporter=junit --outputFile=../test-results/plugin.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-plugin
          path: test-results/
          retention-days: 7

  test-console:
    name: Test Console (vitest)
    runs-on: ubuntu-latest
    needs: lint-typescript
    if: hashFiles('nomos-console/package.json') != ''
    defaults:
      run:
        working-directory: nomos-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx vitest run --reporter=junit --outputFile=../test-results/console.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-console
          path: test-results/
          retention-days: 7

  contract-check:
    name: Contract Check (schemas.py vs types.ts)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pydantic pydantic-settings
      - run: python scripts/export-schemas.py > schemas.json
      - run: npm install ts-morph typescript
      - run: npx tsx scripts/check-contracts.ts

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Stage 3: Quality Gate (blocks merge)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-cli, test-api, test-plugin, test-console, contract-check]
    steps:
      - uses: actions/checkout@v4

      - name: Check for S9 violations
        run: |
          echo "=== S9 Check: No TODOs, placeholders, or skeleton code ==="
          VIOLATIONS=""
          # Check Python code
          if grep -rn "TODO\|FIXME\|HACK\|coming soon\|placeholder\|pass\s*#" \
            nomos-cli/nomos/ nomos-api/nomos_api/ 2>/dev/null | grep -v "__pycache__" | grep -v ".pyc"; then
            VIOLATIONS="Python S9 violations found"
          fi
          # Check TypeScript code
          if grep -rn "TODO\|FIXME\|HACK\|coming soon\|placeholder" \
            nomos-plugin/src/ nomos-console/src/ 2>/dev/null; then
            VIOLATIONS="$VIOLATIONS TypeScript S9 violations found"
          fi
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::$VIOLATIONS"
            exit 1
          fi
          echo "S9 Check passed"

      - name: Check for internal IPs (R12)
        run: |
          echo "=== R12 Check: No internal IPs in product code ==="
          if grep -rn "10\.40\.10\." \
            nomos-cli/nomos/ nomos-api/nomos_api/ nomos-plugin/src/ \
            nomos-console/src/ 2>/dev/null | grep -v "__pycache__"; then
            echo "::error::Internal IPs found in product code (R12 violation)"
            exit 1
          fi
          echo "R12 Check passed"

      - name: Check for hardcoded secrets
        run: |
          echo "=== Secret Check: No credentials in code ==="
          if grep -rn "sk-proj-\|ghp_\|AKIA\|xox[bpors]-\|BEGIN.*PRIVATE KEY" \
            nomos-cli/ nomos-api/ nomos-plugin/ nomos-console/ \
            2>/dev/null | grep -v "__pycache__" | grep -v node_modules | grep -v ".pyc"; then
            echo "::error::Potential secrets found in code"
            exit 1
          fi
          echo "Secret Check passed"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Stage 4: Docker Build (integration)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Stage 5: Summary
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript, test-cli, test-api, test-plugin, test-console, contract-check, quality-gate, docker-build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## NomOS CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint | ${{ needs.lint-python.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TS Lint | ${{ needs.lint-typescript.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Tests | ${{ needs.test-cli.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.test-api.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Tests | ${{ needs.test-plugin.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Console Tests | ${{ needs.test-console.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Check | ${{ needs.contract-check.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result == 'success' && 'âœ…' || 'âŒ' }} |" >> $GITHUB_STEP_SUMMARY
