# NomOS v2 — Docker Compose Stack
# Aktueller Stand: API + PostgreSQL (Console + Plugin werden in Phase H/A neu gebaut)

services:
  nomos-api:
    build:
      context: .
      dockerfile: nomos-api/Dockerfile
    ports:
      - "${NOMOS_API_PORT:-8060}:8000"
    environment:
      - NOMOS_DATABASE_URL=postgresql+asyncpg://nomos:${NOMOS_DB_PASSWORD:-nomos}@postgres:5432/nomos
      - NOMOS_AGENTS_DIR=/data/agents
      - NOMOS_CORS_ORIGINS=["http://localhost:3040","http://localhost:3045"]
    volumes:
      - nomos-agents:/data/agents
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=nomos
      - POSTGRES_USER=nomos
      - POSTGRES_PASSWORD=${NOMOS_DB_PASSWORD:-nomos}
    volumes:
      - nomos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Valkey wird in Phase B hinzugefuegt (Event Bus, Queue)
  # Console wird in Phase H neu gebaut (Next.js 15, Command Center)
  # Plugin wird in Phase A neu gebaut (OpenClaw TypeScript)
  # Piper TTS + Whisper STT werden in Phase H als optionale Services hinzugefuegt

volumes:
  nomos-pgdata:
  nomos-agents:
