name: CI - NomOS Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Lint (fast, catches obvious issues)
  # ---------------------------------------------------------------

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv tool install ruff
      - run: ruff check nomos-cli nomos-api
      - run: ruff format --check nomos-cli nomos-api

  lint-typescript:
    name: Lint TypeScript (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Plugin typecheck
        working-directory: nomos-plugin
        run: npm ci && npx tsc --noEmit
      - name: Console typecheck
        working-directory: nomos-console
        run: npm ci && npx tsc --noEmit

  # ---------------------------------------------------------------
  # Stage 2: Unit Tests (per package)
  # ---------------------------------------------------------------

  test-cli:
    name: Test CLI (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: nomos-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - name: Run pytest with coverage
        run: |
          uv run python -m pytest -v --tb=short \
            --cov=nomos --cov-report=term-missing \
            --cov-report=xml:../coverage-cli.xml \
            --junitxml=../test-results/cli.xml
      - name: Coverage to step summary
        if: always()
        run: |
          echo "### nomos-cli coverage" >> $GITHUB_STEP_SUMMARY
          uv run python -m coverage report --skip-covered \
            | tail -20 >> $GITHUB_STEP_SUMMARY || true
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-cli
          path: |
            test-results/
            coverage-cli.xml
          retention-days: 7

  test-api:
    name: Test API (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: nomos-api
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nomos
          POSTGRES_PASSWORD: nomos
          POSTGRES_DB: nomos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nomos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NOMOS_VALKEY_URL: valkey://localhost:6379
      NOMOS_DATABASE_URL: postgresql+asyncpg://nomos:nomos@localhost:5432/nomos
      # Audit-chain HMAC anchor (fail-closed without >=32 bytes).
      # CI-only sentinel; production injects via Vault.
      NOMOS_HASHCHAIN_HMAC_KEY: ci-only-hmac-test-key-not-for-production-32+
      # Phase-A1: Ed25519 audit-signing seed (test-only, 32 bytes hex).
      NOMOS_AUDIT_SIGNING_KEY: deadbeefcafebabe0123456789abcdef0123456789abcdef0123456789abcdef
      # Auth secrets are hard-gated by K3 (>=32 chars, no sentinel).
      NOMOS_JWT_SECRET: ci-only-jwt-test-secret-not-for-prod-32+chars
      NOMOS_PLUGIN_API_KEY: ci-only-plugin-test-api-key-not-for-prod-32+
      NOMOS_DB_PASSWORD: nomos
      NOMOS_DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      # Apply Alembic migrations against the postgres service container
      # BEFORE pytest. Tests build via Base.metadata.create_all (SQLite),
      # which cannot catch model<->migration drift. Running migrations on
      # real Postgres in CI fails-fast on any drift before any test runs.
      - name: Apply Alembic migrations on real Postgres
        run: uv run alembic upgrade head
      - name: Run pytest with coverage
        run: |
          PYTHONPATH="../nomos-cli" uv run python -m pytest -v --tb=short \
            --cov=nomos_api --cov-report=term-missing \
            --cov-report=xml:../coverage-api.xml \
            --junitxml=../test-results/api.xml
      - name: Coverage to step summary
        if: always()
        run: |
          echo "### nomos-api coverage" >> $GITHUB_STEP_SUMMARY
          uv run python -m coverage report --skip-covered \
            | tail -20 >> $GITHUB_STEP_SUMMARY || true
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-api
          path: |
            test-results/
            coverage-api.xml
          retention-days: 7

  test-plugin:
    name: Test Plugin (vitest)
    runs-on: ubuntu-latest
    needs: lint-typescript
    defaults:
      run:
        working-directory: nomos-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx vitest run --coverage --reporter=junit --outputFile=../test-results/plugin.xml
      - name: Coverage to step summary
        if: always()
        run: |
          echo "### nomos-plugin coverage" >> $GITHUB_STEP_SUMMARY
          [ -f coverage/coverage-summary.json ] \
            && node -e "const c=require('./coverage/coverage-summary.json').total; console.log('lines',c.lines.pct,'branches',c.branches.pct,'funcs',c.functions.pct)" \
            >> $GITHUB_STEP_SUMMARY || true
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-plugin
          path: test-results/
          retention-days: 7

  test-console:
    name: Test Console (vitest)
    runs-on: ubuntu-latest
    needs: lint-typescript
    if: hashFiles('nomos-console/package.json') != ''
    defaults:
      run:
        working-directory: nomos-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx vitest run --coverage --reporter=junit --outputFile=../test-results/console.xml
      - name: Coverage to step summary
        if: always()
        run: |
          echo "### nomos-console coverage" >> $GITHUB_STEP_SUMMARY
          [ -f coverage/coverage-summary.json ] \
            && node -e "const c=require('./coverage/coverage-summary.json').total; console.log('lines',c.lines.pct,'branches',c.branches.pct,'funcs',c.functions.pct)" \
            >> $GITHUB_STEP_SUMMARY || true
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-console
          path: test-results/
          retention-days: 7

  contract-check:
    name: Contract Check (schemas.py vs types.ts)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install pydantic pydantic-settings
      - run: python scripts/export-schemas.py > schemas.json
      - run: npm install ts-morph typescript
      - run: npx tsx scripts/check-contracts.ts

  # ---------------------------------------------------------------
  # Stage 3: Security audit (dependency CVEs + SBOM)
  # ---------------------------------------------------------------

  security-audit:
    name: Security audit (pip-audit / npm audit / SBOM)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript]
    # Dependabot opens its own bumps; skip the audit re-run to avoid
    # PR storms. Trigger manually on dependabot PRs by adding the
    # 'security-audit' label.
    if: github.actor != 'dependabot[bot]' || contains(github.event.pull_request.labels.*.name, 'security-audit')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: pip-audit (api)
        working-directory: nomos-api
        run: |
          pip install pip-audit
          pip-audit --strict || echo "::warning::pip-audit findings in nomos-api"

      - name: pip-audit (cli)
        working-directory: nomos-cli
        run: pip-audit --strict || echo "::warning::pip-audit findings in nomos-cli"

      - name: npm audit (plugin, runtime only)
        working-directory: nomos-plugin
        run: |
          npm ci
          npm audit --omit=dev || echo "::warning::npm audit findings in nomos-plugin"

      - name: npm audit (console, full)
        working-directory: nomos-console
        run: |
          npm ci
          npm audit || echo "::warning::npm audit findings in nomos-console"

      - name: SBOM (Python, CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --output-file sbom-python.json || true

      - name: SBOM (npm, CycloneDX)
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          (cd nomos-plugin && cyclonedx-npm --output-file ../sbom-plugin.json) || true
          (cd nomos-console && cyclonedx-npm --output-file ../sbom-console.json) || true

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom-*.json
          retention-days: 90

  # ---------------------------------------------------------------
  # Stage 4: Quality Gate (blocks merge)
  # ---------------------------------------------------------------

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-cli, test-api, test-plugin, test-console, contract-check]
    steps:
      - uses: actions/checkout@v4

      - name: S9 — no TODOs / placeholders / skeleton code
        run: |
          echo "=== S9 Check ==="
          VIOLATIONS=""
          if grep -rn "TODO\|FIXME\|HACK\|coming soon\|placeholder\|pass\s*#" \
            nomos-cli/nomos/ nomos-api/nomos_api/ 2>/dev/null | grep -v "__pycache__" | grep -v ".pyc"; then
            VIOLATIONS="Python S9 violations found"
          fi
          if grep -rn "TODO\|FIXME\|HACK\|coming soon\|placeholder" \
            nomos-plugin/src/ nomos-console/src/ 2>/dev/null; then
            VIOLATIONS="$VIOLATIONS TypeScript S9 violations found"
          fi
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::$VIOLATIONS"
            exit 1
          fi
          echo "S9 Check passed"

      - name: R12 — no internal IPs in product code
        run: |
          echo "=== R12 Check ==="
          if grep -rn "10\.40\.10\." \
            nomos-cli/nomos/ nomos-api/nomos_api/ nomos-plugin/src/ \
            nomos-console/src/ 2>/dev/null | grep -v "__pycache__"; then
            echo "::error::Internal IPs found in product code (R12 violation)"
            exit 1
          fi
          echo "R12 Check passed"

      - name: Secret-scan — no credentials in code
        run: |
          echo "=== Secret Check ==="
          if grep -rn "sk-proj-\|ghp_\|AKIA\|xox[bpors]-\|BEGIN.*PRIVATE KEY" \
            nomos-cli/ nomos-api/ nomos-plugin/ nomos-console/ \
            2>/dev/null | grep -v "__pycache__" | grep -v node_modules | grep -v ".pyc"; then
            echo "::error::Potential secrets found in code"
            exit 1
          fi
          echo "Secret Check passed"

  # ---------------------------------------------------------------
  # Stage 5: Docker Build + Trivy filesystem & image scan
  # ---------------------------------------------------------------

  docker-build:
    name: Docker Build + Trivy
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      security-events: write   # SARIF upload to the Security tab
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4

      # Trivy filesystem scan: catches CVEs in the source tree
      # (npm + pip lockfiles) before they ever land in an image.
      - name: Trivy fs scan (HIGH+CRITICAL, SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Docker build with GHA cache.
      # cache-from is read-only on PRs; only main pushes write cache.
      - name: Build images (with GHA cache)
        env:
          BUILDX_CACHE_FROM: type=gha,scope=${{ github.ref_name }}
          BUILDX_CACHE_TO: ${{ github.event_name == 'push' && format('type=gha,mode=max,scope={0}', github.ref_name) || '' }}
        run: |
          DOCKER_BUILDKIT=1 docker compose build \
            --build-arg BUILDKIT_INLINE_CACHE=1

      # Trivy image scan: CRITICAL is a blocker; HIGH is SARIF-only.
      - name: Trivy image scan (CRITICAL blocks, HIGH SARIF-only)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: nomos-nomos-api:latest
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Final blocking gate: separate, predictable Trivy run that
      # ONLY fails on CRITICAL (no SARIF, no noise).
      - name: Trivy CRITICAL gate (blocking)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: nomos-nomos-api:latest
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # ---------------------------------------------------------------
  # Stage 6: Summary
  # ---------------------------------------------------------------

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript, test-cli, test-api, test-plugin, test-console, contract-check, security-audit, quality-gate, docker-build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## NomOS CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TS Lint | ${{ needs.lint-typescript.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Tests | ${{ needs.test-cli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Tests | ${{ needs.test-plugin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Console Tests | ${{ needs.test-console.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Check | ${{ needs.contract-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build + Trivy | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
