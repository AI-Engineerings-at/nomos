# NomOS v2 — Complete Docker Compose Stack
# docker compose up -d → alles laeuft
# Ports: Console 3040, API 8060, Gateway 3050, Postgres 5432, Valkey 6380

services:
  # ─── OpenClaw Gateway (headless, NomOS Plugin) ─────────

  openclaw-gateway:
    build:
      context: ./nomos-plugin
      dockerfile: Dockerfile.gateway
    ports:
      - "${NOMOS_GATEWAY_PORT:-3050}:18789"
    environment:
      - NOMOS_PLUGIN_API_KEY=${NOMOS_PLUGIN_API_KEY:?Set NOMOS_PLUGIN_API_KEY in .env}
      - NOMOS_GATEWAY_TOKEN=${NOMOS_GATEWAY_TOKEN:?Set NOMOS_GATEWAY_TOKEN in .env}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # NOTE: openclaw.json uses ${NOMOS_GATEWAY_TOKEN} template variable.
      # The gateway Dockerfile or entrypoint needs envsubst to resolve it.
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - nomos-agents:/home/node/.openclaw/workspace
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── HashiCorp Vault (Secret Management) ──────────────

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - 'VAULT_LOCAL_CONFIG={"storage":{"file":{"path":"/vault/file"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":1}},"disable_mlock":true,"ui":true}'
    volumes:
      - nomos-vault:/vault/file
      - ./vault/policies:/vault/policies:ro
      - ./vault/init.sh:/vault/init.sh:ro
    command: server
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── NomOS Control Plane ───────────────────────────────

  nomos-api:
    build:
      context: .
      dockerfile: nomos-api/Dockerfile
    ports:
      - "${NOMOS_API_PORT:-8060}:8000"
    environment:
      - NOMOS_DATABASE_URL=postgresql+asyncpg://nomos:${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}@postgres:5432/nomos
      - NOMOS_AGENTS_DIR=/data/agents
      - NOMOS_CORS_ORIGINS=["http://localhost:3040","http://localhost:3045"]
      - NOMOS_GATEWAY_URL=http://openclaw-gateway:18789
      - NOMOS_GATEWAY_TOKEN=${NOMOS_GATEWAY_TOKEN:?Set NOMOS_GATEWAY_TOKEN in .env}
      - NOMOS_VALKEY_URL=valkey://valkey:6379
      - NOMOS_JWT_SECRET=${NOMOS_JWT_SECRET:?Set NOMOS_JWT_SECRET in .env}
      - NOMOS_PLUGIN_API_KEY=${NOMOS_PLUGIN_API_KEY:?Set NOMOS_PLUGIN_API_KEY in .env}
      - NOMOS_DB_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
      - NOMOS_DEV_MODE=${NOMOS_DEV_MODE:-false}
      - NOMOS_COOKIE_SECURE=${NOMOS_COOKIE_SECURE:-true}
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
    volumes:
      - nomos-agents:/data/agents
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nomos-worker:
    build:
      context: .
      dockerfile: nomos-api/Dockerfile
    command: ["python", "-m", "arq", "nomos_api.worker.main.WorkerSettings"]
    environment:
      - NOMOS_DATABASE_URL=postgresql+asyncpg://nomos:${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}@postgres:5432/nomos
      - NOMOS_AGENTS_DIR=/data/agents
      - NOMOS_GATEWAY_URL=http://openclaw-gateway:18789
      - NOMOS_GATEWAY_TOKEN=${NOMOS_GATEWAY_TOKEN:?Set NOMOS_GATEWAY_TOKEN in .env}
      - NOMOS_VALKEY_URL=valkey://valkey:6379
      - NOMOS_JWT_SECRET=${NOMOS_JWT_SECRET:?Set NOMOS_JWT_SECRET in .env}
      - NOMOS_PLUGIN_API_KEY=${NOMOS_PLUGIN_API_KEY:?Set NOMOS_PLUGIN_API_KEY in .env}
      - NOMOS_DB_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
      - NOMOS_DEV_MODE=${NOMOS_DEV_MODE:-false}
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
    volumes:
      - nomos-agents:/data/agents
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import arq; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nomos-console:
    build:
      context: .
      dockerfile: nomos-console/Dockerfile
    ports:
      - "${NOMOS_CONSOLE_PORT:-3040}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${NOMOS_API_PORT:-8060}
      - NOMOS_API_URL=http://nomos-api:8000
    depends_on:
      nomos-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Data ──────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=nomos
      - POSTGRES_USER=nomos
      - POSTGRES_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
    volumes:
      - nomos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${NOMOS_VALKEY_PORT:-6380}:6379"
    volumes:
      - nomos-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Reverse Proxy (TLS) ──────────────────────────────

  caddy:
    image: caddy:2-alpine
    ports:
      - "${NOMOS_HTTP_PORT:-80}:80"
      - "${NOMOS_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nomos-caddy-data:/data
      - nomos-caddy-config:/config
    environment:
      - NOMOS_DOMAIN=${NOMOS_DOMAIN:-localhost}
    depends_on:
      nomos-api:
        condition: service_healthy
      nomos-console:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── TTS/STT (optional) ───────────────────────────────

  piper-tts:
    image: rhasspy/wyoming-piper:latest
    ports:
      - "${NOMOS_PIPER_PORT:-10200}:10200"
    command: --voice de_DE-thorsten-high --length-scale 1.0
    volumes:
      - nomos-piper:/data
    restart: unless-stopped
    profiles:
      - speech

  whisper-stt:
    image: linuxserver/faster-whisper:latest
    ports:
      - "${NOMOS_WHISPER_PORT:-10300}:10300"
    environment:
      - WHISPER_MODEL=base
      - WHISPER_LANGUAGE=de
    volumes:
      - nomos-whisper:/data
    restart: unless-stopped
    profiles:
      - speech

volumes:
  nomos-pgdata:
  nomos-agents:
  nomos-valkey:
  nomos-vault:
  nomos-caddy-data:
  nomos-caddy-config:
  nomos-piper:
  nomos-whisper:
