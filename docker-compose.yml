# NomOS v2 — Complete Docker Compose Stack
# docker compose up -d → alles laeuft
# Host-exposed ports: Console 3040, API 8060, Gateway 3050, Caddy 80/443.
# Internal-only (M4, no host mapping): vault 8200, valkey 6379, postgres 5432.

services:
  # ─── OpenClaw Gateway (headless, NomOS Plugin) ─────────

  openclaw-gateway:
    build:
      context: ./nomos-plugin
      dockerfile: Dockerfile.gateway
    ports:
      - "${NOMOS_GATEWAY_PORT:-3050}:18789"
    environment:
      - NOMOS_PLUGIN_API_KEY=${NOMOS_PLUGIN_API_KEY:-}
      - NOMOS_GATEWAY_TOKEN=${NOMOS_GATEWAY_TOKEN:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - nomos-agents:/home/node/.openclaw/workspace
      - nomos-vault-init:/vault/init:ro
    depends_on:
      valkey:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── HashiCorp Vault (Secret Management) ──────────────

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    # M4: NO host port mapping. Vault is reached only over the internal
    # compose network (http://vault:8200) by nomos-api / nomos-worker /
    # vault-init. Exposing 8200 to the host needlessly widened the attack
    # surface for the most security-critical service.
    expose:
      - "8200"
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - 'VAULT_LOCAL_CONFIG={"storage":{"file":{"path":"/vault/file"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":1}},"disable_mlock":true,"ui":true}'
    volumes:
      - nomos-vault:/vault/file
      - ./vault/policies:/vault/policies:ro
      - ./vault/init.sh:/vault/init.sh:ro
    command: server
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── Vault Init (one-shot bootstrap) ──────────────────

  vault-init:
    image: hashicorp/vault:1.17
    entrypoint: ["/bin/sh", "/vault/scripts/init-entrypoint.sh"]
    environment:
      - VAULT_ADDR=http://vault:8200
      - NOMOS_DB_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
    volumes:
      - nomos-vault:/vault/file
      - nomos-vault-init:/vault/init
      - ./vault/policies:/vault/policies:ro
      - ./vault/init-entrypoint.sh:/vault/scripts/init-entrypoint.sh:ro
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  # ─── NomOS Control Plane ───────────────────────────────

  nomos-api:
    build:
      context: .
      dockerfile: nomos-api/Dockerfile
    ports:
      - "${NOMOS_API_PORT:-8060}:8000"
    environment:
      - NOMOS_DATABASE_URL=postgresql+asyncpg://nomos:${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}@postgres:5432/nomos
      - NOMOS_AGENTS_DIR=/data/agents
      - NOMOS_CORS_ORIGINS=["http://localhost:3040","http://localhost:3045"]
      - NOMOS_GATEWAY_URL=http://openclaw-gateway:18789
      - NOMOS_VALKEY_URL=valkey://valkey:6379
      - NOMOS_DB_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
      - NOMOS_DEV_MODE=${NOMOS_DEV_MODE:-false}
      - NOMOS_COOKIE_SECURE=${NOMOS_COOKIE_SECURE:-true}
      - NOMOS_LLM_BASE_URL=${NOMOS_LLM_BASE_URL:-}
      - NOMOS_LLM_API_KEY=${NOMOS_LLM_API_KEY:-}
      - NOMOS_LLM_MODEL=${NOMOS_LLM_MODEL:-}
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
    volumes:
      - nomos-agents:/data/agents
      # Phase-A2 (0.2.0): audit anchors live on a SEPARATE volume so
      # an attacker with write access to the chain volume cannot
      # silently rewrite both the chain and the durable anchors. In
      # production, mount this on WORM-capable storage (S3 Object
      # Lock / Azure immutable blob) — the named Docker volume is
      # only a separation baseline.
      - nomos-anchors:/data/audit-anchors
      - nomos-vault-init:/vault/init:ro
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nomos-worker:
    build:
      context: .
      dockerfile: nomos-api/Dockerfile
    command: ["python", "-m", "arq", "nomos_api.worker.main.WorkerSettings"]
    environment:
      - NOMOS_DATABASE_URL=postgresql+asyncpg://nomos:${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}@postgres:5432/nomos
      - NOMOS_AGENTS_DIR=/data/agents
      - NOMOS_GATEWAY_URL=http://openclaw-gateway:18789
      - NOMOS_VALKEY_URL=valkey://valkey:6379
      - NOMOS_DB_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
      - NOMOS_DEV_MODE=${NOMOS_DEV_MODE:-false}
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
    volumes:
      - nomos-agents:/data/agents
      # See nomos-api comment above — same separate anchors volume so
      # the anchor cron can write where the API reads/verifies.
      - nomos-anchors:/data/audit-anchors
      - nomos-vault-init:/vault/init:ro
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import arq; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nomos-console:
    build:
      context: .
      dockerfile: nomos-console/Dockerfile
    ports:
      - "${NOMOS_CONSOLE_PORT:-3040}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${NOMOS_API_PORT:-8060}
      - NOMOS_API_URL=http://nomos-api:8000
    depends_on:
      nomos-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Data ──────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=nomos
      - POSTGRES_USER=nomos
      - POSTGRES_PASSWORD=${NOMOS_DB_PASSWORD:?Set NOMOS_DB_PASSWORD in .env}
    volumes:
      - nomos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    # M4: NO host port mapping. Valkey is reached only over the internal
    # compose network (valkey://valkey:6379) by nomos-api / nomos-worker.
    # Local test runs use a SEPARATE test Valkey, so removing the compose
    # host port does not affect the test workflow.
    expose:
      - "6379"
    volumes:
      - nomos-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Reverse Proxy (TLS) ──────────────────────────────

  caddy:
    image: caddy:2-alpine
    ports:
      - "${NOMOS_HTTP_PORT:-80}:80"
      - "${NOMOS_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nomos-caddy-data:/data
      - nomos-caddy-config:/config
    environment:
      - NOMOS_DOMAIN=${NOMOS_DOMAIN:-localhost}
    depends_on:
      nomos-api:
        condition: service_healthy
      nomos-console:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── TTS/STT (optional) ───────────────────────────────

  piper-tts:
    image: rhasspy/wyoming-piper:latest
    ports:
      - "${NOMOS_PIPER_PORT:-10200}:10200"
    command: --voice de_DE-thorsten-high --length-scale 1.0
    volumes:
      - nomos-piper:/data
    restart: unless-stopped
    profiles:
      - speech

  whisper-stt:
    image: linuxserver/faster-whisper:latest
    ports:
      - "${NOMOS_WHISPER_PORT:-10300}:10300"
    environment:
      - WHISPER_MODEL=base
      - WHISPER_LANGUAGE=de
    volumes:
      - nomos-whisper:/data
    restart: unless-stopped
    profiles:
      - speech

volumes:
  nomos-pgdata:
  nomos-agents:
  # Separate audit-anchors volume (Phase-A2, 0.2.0). DO NOT collapse
  # back into nomos-agents — the threat model assumes an attacker may
  # gain write access to the chain volume, and the anchor file is
  # what catches retroactive forgery. Operators should override this
  # in docker-compose.override.yml to point at WORM-capable storage.
  nomos-anchors:
  nomos-valkey:
  nomos-vault:
  nomos-vault-init:
  nomos-caddy-data:
  nomos-caddy-config:
  nomos-piper:
  nomos-whisper:
