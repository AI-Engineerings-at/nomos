name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv tool install ruff
      - run: ruff check nomos-cli nomos-api
      - run: ruff format --check nomos-cli nomos-api

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: nomos-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest -v --tb=short

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: nomos-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: PYTHONPATH="../nomos-cli" uv run pytest -v --tb=short
